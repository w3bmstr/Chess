<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess2 Engine Harness</title>
    <style>
        :root {
            --bg: #f3efe6;
            --panel: #fffdf8;
            --ink: #2b2418;
            --line: #d6c9b3;
            --accent: #72512f;
            --ok: #257942;
            --bad: #b23b2a;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Georgia, 'Times New Roman', serif;
            background: linear-gradient(180deg, #ebe2d2 0%, var(--bg) 100%);
            color: var(--ink);
        }

        main {
            max-width: 980px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(28px, 4vw, 44px);
        }

        p {
            margin: 0 0 18px;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            gap: 18px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 10px 30px rgba(60, 42, 18, 0.08);
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
        }

        textarea, input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            font: inherit;
            background: #fff;
            color: var(--ink);
        }

        textarea { min-height: 92px; resize: vertical; }

        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .actions-note {
            margin-top: 10px;
            font-size: 13px;
            line-height: 1.45;
            opacity: 0.78;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 10px 16px;
            background: var(--accent);
            color: #fff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        button.secondary {
            background: #d9ccb5;
            color: var(--ink);
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.45;
        }

        .pass { color: var(--ok); }
        .fail { color: var(--bad); }
        .muted { opacity: 0.7; }
    </style>
</head>
<body>
    <main>
        <h1>Chess2 Engine Harness</h1>
        <p>Use this page to verify the browser engine API directly and through the worker transport.</p>

        <div class="grid">
            <section class="panel">
                <label for="fen-input">FEN</label>
                <textarea id="fen-input">rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1</textarea>
                <div class="row">
                    <div style="flex:1 1 110px; min-width:110px;">
                        <label for="depth-input">Depth</label>
                        <input id="depth-input" type="number" min="1" max="4" value="2">
                    </div>
                </div>
                <div class="row">
                    <button id="run-direct">Run Direct Engine</button>
                    <button id="run-worker">Run Worker Engine</button>
                    <button id="run-smoke" class="secondary">Run Smoke Tests</button>
                    <button id="open-fast-suite" class="secondary">Open Fast Smoke Suite</button>
                    <button id="open-deep-suite" class="secondary">Open Deep Regression</button>
                    <button id="open-test-suite" class="secondary">Open Full Test Suite</button>
                </div>
                <p class="actions-note">This harness is for manual engine and transport checks. The automated browser suites live in <code>tests/engine-smoke.html</code>, <code>tests/engine-deep.html</code>, and <code>tests/engine-tests.html</code>.</p>
            </section>

            <section class="panel">
                <label>Results</label>
                <pre id="results">Ready.</pre>
            </section>
        </div>
    </main>

    <script src="engine/core/magic.js"></script>
    <script src="engine/core/bitboards.js"></script>
    <script src="engine/core/position.js"></script>
    <script src="engine/core/movegen.js"></script>
    <script src="engine/core/zobrist.js"></script>
    <script src="engine/search/tt.js"></script>
    <script src="engine/search/ordering.js"></script>
    <script src="engine/search/stack.js"></script>
    <script src="engine/eval/pst.js"></script>
    <script src="engine/eval/pawns.js"></script>
    <script src="engine/eval/mobility.js"></script>
    <script src="engine/eval/king_safety.js"></script>
    <script src="engine/eval/threats.js"></script>
    <script src="engine/eval/nnue.js"></script>
    <script src="engine/eval/eval.js"></script>
    <script src="engine/search/search.js"></script>
    <script src="engine/engine.js"></script>
    <script src="ui/workers/engine_worker.js"></script>
    <script>
        const results = document.getElementById('results');
        const fenInput = document.getElementById('fen-input');
        const depthInput = document.getElementById('depth-input');
        const openFastSuiteButton = document.getElementById('open-fast-suite');
        const openDeepSuiteButton = document.getElementById('open-deep-suite');
        const openFullSuiteButton = document.getElementById('open-test-suite');

        function write(lines) {
            results.textContent = Array.isArray(lines) ? lines.join('\n') : String(lines);
        }

        async function runEngine(label, options) {
            const engine = window.createPlayEngine(options);
            const depth = Math.max(1, Math.min(4, parseInt(depthInput.value || '2', 10)));
            const fen = fenInput.value.trim();
            const lines = [label + '...', ''];

            try {
                await Promise.resolve(engine.setPosition(fen));
                const result = await engine.go({ depth });
                lines.push('bestMove: ' + (result.bestMove || '(none)'));
                lines.push('score: ' + result.score);
                lines.push('info: ' + JSON.stringify(engine.getInfo(), null, 2));
                lines.push('mode: ' + engine.mode);
                write(lines);
            } catch (error) {
                lines.push('ERROR: ' + (error && error.message ? error.message : String(error)));
                write(lines);
            } finally {
                if (engine && typeof engine.destroy === 'function') {
                    engine.destroy();
                }
            }
        }

        async function runSmokeTests() {
            const scenarios = [
                { name: 'Direct', options: { preferWorker: false } },
                { name: 'Worker', options: { preferWorker: true } },
            ];
            const lines = ['Running smoke tests...', ''];

            const moduleStatus = {
                BB_ATTACKS: typeof window.BB_ATTACKS !== 'undefined',
                ZOBRIST: typeof window.ZOBRIST !== 'undefined',
                TT: typeof window.TT !== 'undefined',
                ORDER: typeof window.ORDER !== 'undefined',
                STACK: typeof window.STACK !== 'undefined',
                EVAL: typeof window.EVAL !== 'undefined',
                SEARCH: typeof window.SEARCH !== 'undefined',
            };

            lines.push('module status: ' + JSON.stringify(moduleStatus));
            if (location.protocol === 'file:') {
                lines.push('note: file:// origin forces the worker test to use the local engine bridge.');
            }
            lines.push('');

            for (const scenario of scenarios) {
                const engine = window.createPlayEngine(scenario.options);
                try {
                    await Promise.resolve(engine.setPosition('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1'));
                    const result = await engine.go({ depth: 1 });
                    const ok = Boolean(result.bestMove);
                    lines.push((ok ? 'PASS' : 'FAIL') + ' ' + scenario.name + ' [' + engine.mode + ']: ' + (result.bestMove || '(none)'));
                } catch (error) {
                    lines.push('FAIL ' + scenario.name + ' [' + engine.mode + ']: ' + (error && error.message ? error.message : String(error)));
                } finally {
                    if (engine && typeof engine.destroy === 'function') {
                        engine.destroy();
                    }
                }
            }

            write(lines);
        }

        document.getElementById('run-direct').addEventListener('click', () => runEngine('Direct engine run', { preferWorker: false }));
        document.getElementById('run-worker').addEventListener('click', () => runEngine('Worker engine run', { preferWorker: true }));
        document.getElementById('run-smoke').addEventListener('click', runSmokeTests);
        openFastSuiteButton.addEventListener('click', () => {
            window.location.href = 'tests/engine-smoke.html';
        });
        openDeepSuiteButton.addEventListener('click', () => {
            window.location.href = 'tests/engine-deep.html';
        });
        openFullSuiteButton.addEventListener('click', () => {
            window.location.href = 'tests/engine-tests.html';
        });
    </script>
</body>
</html>
