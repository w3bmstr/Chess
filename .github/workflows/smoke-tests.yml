name: Smoke Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  browser-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start local static server
        run: python3 -m http.server 8765 --bind 127.0.0.1 > /tmp/chess2-http.log 2>&1 &

      - name: Run browser smoke suite
        env:
          CHESS2_ARTIFACT_DIR: artifacts/smoke
          CHESS2_TEST_NAME: Smoke Suite
        run: npm run test:smoke

      - name: Upload smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chess2-smoke-failure-artifacts
          path: |
            /tmp/chess2-http.log
            artifacts/smoke